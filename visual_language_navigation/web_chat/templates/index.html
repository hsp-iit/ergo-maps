<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROS2 Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script type="text/javascript" async 
        src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" async 
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #343541;
            color: white;
        }
        #chat-container {
            width: 90vw;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: white;
            border: 4px solid #444;
            border-radius: 10px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        #chatbox {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: url('/static/background.png') no-repeat center center;
            background-size: cover;
        }
        .message-container {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .message {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            font-size: 18px;
        }
        .robot .message { 
            background: rgba(220, 220, 220, 0.9); 
            text-align: left; 
            font-family: monospace; 
            white-space: pre-wrap;
        }
        .robot .message { background: rgb(138, 1, 127); text-align: left; }
        .user .message { background: rgba(1, 36, 88, 0.9); text-align: right; }
        .robot { flex-direction: row; }
        .user { flex-direction: row-reverse; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            border: 2px solid #444;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chatbox"></div>
    </div>

    <script>
        var socket = io.connect("http://127.0.0.1:5000");

        socket.on("chat_message", function(data) {
            var chatbox = document.getElementById("chatbox");
            var messageContainer = document.createElement("div");
            var messageDiv = document.createElement("div");
            var avatar = document.createElement("img");

            var messageText = data.message.trim();
            var firstWord = messageText.split(" ")[0];
            var userClass = "robot";  // Default to robot
            var userImage = "/static/robot.png";  // Default robot image

            if (firstWord.toLowerCase() === "user:") {
                userClass = "user";
                userImage = "/static/user.png";
                messageText = messageText.substring(5);
            } else if (firstWord.toLowerCase() === "robot:") {
                messageText = messageText.substring(6);
            }

            messageContainer.className = "message-container " + userClass;
            messageDiv.className = "message";
            messageDiv.innerHTML = messageText; // Allow HTML for MathJax rendering

            // Apply monospaced font and formatting for robot messages
            if (userClass === "robot") {
                messageDiv.style.fontFamily = "monospace";
                messageDiv.style.whiteSpace = "pre-wrap";
                //messageDiv.style.background = "rgba(220, 220, 220, 0.9)";
            }

            avatar.src = userImage;
            avatar.className = "avatar";

            messageContainer.appendChild(avatar);
            messageContainer.appendChild(messageDiv);

            chatbox.appendChild(messageContainer);
            chatbox.scrollTop = chatbox.scrollHeight;

            // Process MathJax after adding the new message
            MathJax.typesetPromise([messageDiv]).catch(function (err) {
                console.error("MathJax rendering error:", err);
            });
        });
    </script>

</body>
</html>
